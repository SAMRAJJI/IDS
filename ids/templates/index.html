<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDS - Intrusion Detection System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 15px 30px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1em;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: bold;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 30px;
            border-radius: 15px;
            display: none;
            animation: slideIn 0.5s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.attack {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
        }

        .result.normal {
            background: linear-gradient(135deg, #51cf66 0%, #37b24d 100%);
            color: white;
        }

        .result h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        .result-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .result-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
        }

        .result-item h3 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .result-item p {
            font-size: 1.8em;
            font-weight: bold;
        }

        .loader {
            display: none;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .section-title {
            background: #f5f5f5;
            padding: 10px 15px;
            margin: 20px 0 10px 0;
            border-left: 4px solid #667eea;
            font-weight: bold;
        }

        .info-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #2196f3;
        }

        .preset-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .preset-btn {
            padding: 10px 20px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .preset-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Intrusion Detection System</h1>
            <p>Deep Learning-based Network Traffic Analysis</p>
        </div>

        <div class="content">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('quick')">Quick Prediction</button>
                <button class="tab" onclick="switchTab('advanced')">Advanced Settings</button>
            </div>

            <form id="predictionForm">
                <!-- Quick Tab -->
                <div id="quick-tab" class="tab-content active">
                    <div class="info-box">
                        <strong>ℹ️ Quick Mode:</strong> Enter essential network traffic features. Other features will use safe defaults.
                    </div>

                    <div class="preset-buttons">
                        <button type="button" class="preset-btn" onclick="loadPreset('normal')">Load Normal Traffic</button>
                        <button type="button" class="preset-btn" onclick="loadPreset('attack')">Load Attack Pattern</button>
                        <button type="button" class="preset-btn" onclick="clearForm()">Clear Form</button>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label>Duration (seconds)</label>
                            <input type="number" name="duration" value="0" min="0">
                        </div>

                        <div class="form-group">
                            <label>Protocol Type</label>
                            <select name="protocol_type">
                                {% for protocol in protocols %}
                                <option value="{{ protocol }}">{{ protocol }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Service</label>
                            <select name="service">
                                {% for service in services %}
                                <option value="{{ service }}">{{ service }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Flag</label>
                            <select name="flag">
                                {% for flag in flags %}
                                <option value="{{ flag }}">{{ flag }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Source Bytes</label>
                            <input type="number" name="src_bytes" value="232" min="0">
                        </div>

                        <div class="form-group">
                            <label>Destination Bytes</label>
                            <input type="number" name="dst_bytes" value="8153" min="0">
                        </div>

                        <div class="form-group">
                            <label>Connection Count</label>
                            <input type="number" name="count" value="2" min="0">
                        </div>

                        <div class="form-group">
                            <label>Logged In</label>
                            <select name="logged_in">
                                <option value="1">Yes</option>
                                <option value="0">No</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Advanced Tab -->
                <div id="advanced-tab" class="tab-content">
                    <div class="section-title">Connection Features</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Land</label>
                            <input type="number" name="land" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label>Wrong Fragment</label>
                            <input type="number" name="wrong_fragment" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label>Urgent</label>
                            <input type="number" name="urgent" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label>Hot</label>
                            <input type="number" name="hot" value="0" min="0">
                        </div>
                    </div>

                    <div class="section-title">Authentication Features</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Failed Logins</label>
                            <input type="number" name="num_failed_logins" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label>Compromised</label>
                            <input type="number" name="num_compromised" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label>Root Shell</label>
                            <input type="number" name="root_shell" value="0" min="0" max="1">
                        </div>
                        <div class="form-group">
                            <label>SU Attempted</label>
                            <input type="number" name="su_attempted" value="0" min="0">
                        </div>
                    </div>

                    <div class="section-title">Traffic Statistics</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Service Count</label>
                            <input type="number" name="srv_count" value="2" min="0">
                        </div>
                        <div class="form-group">
                            <label>SError Rate</label>
                            <input type="number" name="serror_rate" value="0.0" step="0.01" min="0" max="1">
                        </div>
                        <div class="form-group">
                            <label>Service SError Rate</label>
                            <input type="number" name="srv_serror_rate" value="0.0" step="0.01" min="0" max="1">
                        </div>
                        <div class="form-group">
                            <label>Same Service Rate</label>
                            <input type="number" name="same_srv_rate" value="1.0" step="0.01" min="0" max="1">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn">🔍 Analyze Traffic</button>
            </form>

            <div class="loader" id="loader"></div>

            <div id="result" class="result">
                <h2 id="resultTitle"></h2>
                <div class="result-details">
                    <div class="result-item">
                        <h3>Attack Probability</h3>
                        <p id="probability">-</p>
                    </div>
                    <div class="result-item">
                        <h3>Confidence</h3>
                        <p id="confidence">-</p>
                    </div>
                    <div class="result-item">
                        <h3>Risk Level</h3>
                        <p id="riskLevel">-</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        function loadPreset(type) {
            if (type === 'normal') {
                document.querySelector('[name="duration"]').value = 0;
                document.querySelector('[name="protocol_type"]').value = 'tcp';
                document.querySelector('[name="service"]').value = 'http';
                document.querySelector('[name="flag"]').value = 'SF';
                document.querySelector('[name="src_bytes"]').value = 232;
                document.querySelector('[name="dst_bytes"]').value = 8153;
                document.querySelector('[name="count"]').value = 2;
                document.querySelector('[name="logged_in"]').value = 1;
            } else if (type === 'attack') {
                document.querySelector('[name="duration"]').value = 0;
                document.querySelector('[name="protocol_type"]').value = 'icmp';
                document.querySelector('[name="service"]').value = 'ecr_i';
                document.querySelector('[name="flag"]').value = 'SF';
                document.querySelector('[name="src_bytes"]').value = 1032;
                document.querySelector('[name="dst_bytes"]').value = 0;
                document.querySelector('[name="count"]').value = 511;
                document.querySelector('[name="logged_in"]').value = 0;
            }
        }

        function clearForm() {
            document.getElementById('predictionForm').reset();
        }

        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Show loader
            document.getElementById('loader').style.display = 'block';
            document.getElementById('result').style.display = 'none';

            const formData = new FormData(e.target);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                // Hide loader
                document.getElementById('loader').style.display = 'none';

                if (data.success) {
                    // Show result
                    const resultDiv = document.getElementById('result');
                    resultDiv.style.display = 'block';
                    resultDiv.className = 'result ' + (data.prediction === 'ATTACK' ? 'attack' : 'normal');

                    document.getElementById('resultTitle').textContent = 
                        data.prediction === 'ATTACK' ? '⚠️ ATTACK DETECTED!' : '✅ NORMAL TRAFFIC';
                    document.getElementById('probability').textContent = data.probability + '%';
                    document.getElementById('confidence').textContent = data.confidence + '%';
                    document.getElementById('riskLevel').textContent = data.risk_level;

                    // Scroll to result
                    resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                document.getElementById('loader').style.display = 'none';
                alert('Error: ' + error.message);
            }
        });
    </script>
</body>
</html>
